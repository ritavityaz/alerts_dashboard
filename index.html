<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operation Sleepy Lion</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦁</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-950 text-gray-200 font-sans pb-8">
  <header class="sticky top-0 z-40 bg-gray-950/90 backdrop-blur-sm border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-2 sm:px-4 flex items-center h-12 sm:h-14 gap-3 sm:gap-6">
      <a href="#" class="flex items-center gap-2 shrink-0">
        <span class="text-2xl" role="img" aria-label="lion">🦁</span>
        <h1 id="page-title" class="text-base sm:text-lg font-bold whitespace-nowrap">Operation Sleepy Lion</h1>
      </a>
      <p id="subtitle" class="text-gray-500 text-xs sm:text-sm hidden sm:block whitespace-nowrap"></p>
      <div class="flex-1"></div>
      <nav class="hidden sm:flex items-center gap-4 text-sm">
        <a href="#map-section" class="text-gray-400 hover:text-white transition-colors" data-i18n="navMap">Map</a>
        <a href="#timeline-section" class="text-gray-400 hover:text-white transition-colors" data-i18n="navTimeline">Timeline</a>
        <a href="#stats-section" class="text-gray-400 hover:text-white transition-colors" data-i18n="navStats">Stats</a>
      </nav>
      <div id="lang-toggle" class="flex text-xs shrink-0">
        <button data-lang="en" class="px-2 py-1 rounded-l border border-gray-700 bg-indigo-600 text-white cursor-pointer">EN</button>
        <button data-lang="he" class="px-2 py-1 rounded-r border border-gray-700 bg-gray-800 text-gray-400 cursor-pointer">HE</button>
      </div>
    </div>
  </header>

  <main id="app" class="max-w-7xl mx-auto px-2 sm:px-4 pt-4">
    <div id="filter-bar" class="mb-3 flex flex-wrap sm:flex-nowrap items-center gap-2 sm:gap-3">
      <select id="threat-filter" class="bg-gray-800 text-gray-200 text-sm border border-gray-700 rounded px-3 py-1.5">
        <option value="all" data-i18n="allThreats">All threats</option>
        <option value="1" data-i18n="missiles">Missiles</option>
        <option value="2" data-i18n="drones">Drones</option>
        <option value="10" data-i18n="infiltrations">Infiltrations</option>
      </select>
      <input id="city-filter" list="city-list" placeholder="City..." class="bg-gray-800 text-gray-200 text-sm border border-gray-700 rounded px-3 py-1.5 w-full sm:w-40 order-last sm:order-none">
      <datalist id="city-list"></datalist>
      <select id="zone-filter" class="bg-gray-800 text-gray-200 text-sm border border-gray-700 rounded px-3 py-1.5">
        <option value="all" data-i18n="allZones">All zones</option>
      </select>
      <button id="reset-filters" class="text-gray-500 text-sm hover:text-gray-200 cursor-pointer hidden" data-i18n="reset">Reset</button>
      <div id="context-toggle" class="sm:ml-auto flex text-xs hidden">
        <button data-ctx="country" data-i18n="country" class="px-2 py-1 rounded-l border border-gray-700 bg-gray-800 text-gray-400 hover:text-white cursor-pointer">Country</button>
        <button data-ctx="zone" data-i18n="zone" class="px-2 py-1 border-t border-b border-gray-700 bg-gray-800 text-gray-400 hover:text-white cursor-pointer">Zone</button>
        <button data-ctx="city" data-i18n="city" class="px-2 py-1 rounded-r border border-gray-700 bg-indigo-600 text-white cursor-pointer">City</button>
      </div>
    </div>
    <div id="legend" class="mb-2 flex items-center gap-2 text-xs text-gray-400">
      <span id="legend-min">0</span>
      <canvas id="legend-bar" height="12" class="rounded flex-1"></canvas>
      <span id="legend-max">0</span>
      <span data-i18n="alerts">alerts</span>
    </div>
    <div id="map-section"></div>
    <div id="map-stats-row" class="flex flex-col sm:flex-row gap-3">
      <div id="map-container" class="bg-gray-900 border border-gray-800 rounded-lg sm:flex-1 min-w-0"></div>
      <div id="stats-panel" class="flex flex-row flex-wrap sm:flex-col sm:flex-nowrap gap-3 w-full sm:w-48 sm:shrink-0">
        <div class="bg-gray-900 border border-gray-800 rounded-lg p-4 flex-1 basis-[calc(50%-0.375rem)] sm:basis-auto">
          <div class="text-gray-500 text-xs mb-1" data-i18n="totalAlerts">Total Alerts</div>
          <div id="stat-total" class="text-2xl font-bold">0</div>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-lg p-4 flex-1 basis-[calc(50%-0.375rem)] sm:basis-auto">
          <div class="text-gray-500 text-xs mb-1" data-i18n="citiesAffected">Cities Affected</div>
          <div id="stat-cities" class="text-2xl font-bold">0</div>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-lg p-4 flex-1 basis-[calc(50%-0.375rem)] sm:basis-auto">
          <div class="text-gray-500 text-xs mb-1" data-i18n="peakDay">Peak Day</div>
          <div id="stat-peak-day" class="text-lg font-bold">—</div>
          <div id="stat-peak-count" class="text-gray-400 text-xs"></div>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-lg p-4 flex-1 basis-[calc(50%-0.375rem)] sm:basis-auto">
          <div class="text-gray-500 text-xs mb-1" data-i18n="threats">Threats</div>
          <div id="stat-missiles" class="text-sm"><span class="text-gray-400" data-i18n="missiles">Missiles</span> <span class="font-bold float-right">0</span></div>
          <div id="stat-drones" class="text-sm"><span class="text-gray-400" data-i18n="drones">Drones</span> <span class="font-bold float-right">0</span></div>
          <div id="stat-infiltration" class="text-sm"><span class="text-gray-400" data-i18n="infiltrations">Infiltrations</span> <span class="font-bold float-right">0</span></div>
        </div>
      </div>
    </div>
    <div class="mt-3">
      <div id="sparkline" class="w-full" style="height:40px"></div>
      <div class="range-slider">
        <input type="range" id="range-min" min="0" max="100" value="0">
        <input type="range" id="range-max" min="0" max="100" value="100">
        <div class="range-track"></div>
        <div id="range-highlight" class="range-highlight"></div>
      </div>
      <div class="flex justify-between text-xs text-gray-400 mt-1">
        <span id="slider-start"></span>
        <span id="slider-end"></span>
      </div>
    </div>

    <div id="timeline-section"></div>
    <h2 id="timeline-title" class="text-lg font-bold mt-8 mb-3" data-i18n="alertTimeline">Alert Timeline</h2>
    <div id="timeline-heatmap-row" class="flex flex-col sm:flex-row gap-3">
      <div id="timeline-container" class="bg-gray-900 border border-gray-800 rounded-lg overflow-x-auto flex-1 min-w-0"></div>
      <div id="heatmap-container" class="bg-gray-900 border border-gray-800 rounded-lg shrink-0"></div>
    </div>
    <div id="stats-section" class="bg-gray-900 border border-gray-800 rounded-lg p-4 mt-3">
      <div id="quiet-stats-inner" class="flex flex-col sm:flex-row gap-4 sm:gap-8">
      <div>
        <div class="text-gray-400 text-sm font-semibold mb-2" data-i18n="longestQuiet">Longest Quiet</div>
        <div class="flex gap-6">
          <div id="stat-quiet-today" class="text-sm">
            <div class="text-gray-500 text-xs" data-i18n="today">Today</div>
            <div class="font-bold">—</div>
          </div>
          <div id="stat-quiet-3d" class="text-sm">
            <div class="text-gray-500 text-xs" data-i18n="past3days">3 days</div>
            <div class="font-bold">—</div>
          </div>
          <div id="stat-quiet-7d" class="text-sm">
            <div class="text-gray-500 text-xs" data-i18n="past7days">7 days</div>
            <div class="font-bold">—</div>
          </div>
          <div id="stat-quiet-all" class="text-sm">
            <div class="text-gray-500 text-xs" data-i18n="sinceStart">All time</div>
            <div class="font-bold">—</div>
          </div>
        </div>
      </div>
      <div class="border-t sm:border-t-0 sm:border-l border-gray-700 pt-4 sm:pt-0 sm:pl-8">
        <div class="text-gray-400 text-sm font-semibold mb-2" data-i18n="quietestHour">Quietest Hours</div>
        <div class="flex gap-6">
          <div id="stat-quietest-3d" class="text-sm">
            <div class="text-gray-500 text-xs" data-i18n="past3days">3 days</div>
            <div class="font-bold" data-field="range">—</div>
            <div class="text-gray-500 text-xs" data-field="dur"></div>
          </div>
          <div id="stat-quietest-7d" class="text-sm">
            <div class="text-gray-500 text-xs" data-i18n="past7days">7 days</div>
            <div class="font-bold" data-field="range">—</div>
            <div class="text-gray-500 text-xs" data-field="dur"></div>
          </div>
          <div id="stat-quietest-all" class="text-sm">
            <div class="text-gray-500 text-xs" data-i18n="sinceStart">All time</div>
            <div class="font-bold" data-field="range">—</div>
            <div class="text-gray-500 text-xs" data-field="dur"></div>
          </div>
        </div>
      </div>
      </div>
    </div>
  </main>

  <div id="tooltip" class="tooltip"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
